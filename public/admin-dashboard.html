<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f4f4f4; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #eee; }
        input { padding: 8px; margin: 5px; width: 150px; }
        button { padding: 8px 15px; cursor: pointer; }
        .btn-approve { background: green; color: white; border: none; }
        .btn-reject { background: red; color: white; border: none; }
    </style>
</head>
<body>
    <h2>Admin Dashboard</h2>

    <!-- Add Customer Form -->
    <div class="card">
        <h3>Add New Customer</h3>
        <form action="/add-customer" method="POST">
            <input type="text" name="name" placeholder="Name" required>
            <input type="number" name="phone" placeholder="Phone" required>
            <input type="text" name="password" placeholder="Password" required>
            <input type="number" name="aadhaar" placeholder="Aadhaar" required>
            <input type="text" name="pan" placeholder="PAN" required>
            <input type="number" name="loan_amount" placeholder="Loan Amount" required>
            <button type="submit">Save Customer</button>
        </form>
    </div>

    <div id="admin-content"></div>

    <script>
        fetch('/admin-data').then(res => res.json()).then(data => {
            const content = document.getElementById('admin-content');
            
            // Pending Payments
            let html = '<div class="card"><h3>Pending Approvals</h3><table><tr><th>Name</th><th>Week</th><th>Amount</th><th>Action</th></tr>';
            data.payments.filter(p => p.status === 'Pending').forEach(p => {
                html += `<tr><td>${p.customer_name}</td><td>${p.week_number}</td><td>₹${p.amount}</td>
                <td>
                    <form action="/approve-payment" method="POST" style="display:inline"><input type="hidden" name="payment_id" value="${p.id}"><button class="btn-approve">Approve</button></form>
                    <form action="/reject-payment" method="POST" style="display:inline"><input type="hidden" name="payment_id" value="${p.id}"><button class="btn-reject">Reject</button></form>
                </td></tr>`;
            });
            html += '</table></div>';

            // All Customers
            html += '<div class="card"><h3>Customers List</h3><table><tr><th>Name</th><th>Phone</th><th>Loan Amount</th></tr>';
            data.customers.forEach(c => {
                html += `<tr><td>${c.name}</td><td>${c.phone}</td><td>₹${c.loan_amount}</td></tr>`;
            });
            html += '</table></div>';
            content.innerHTML = html;
        });
    </script>
</body>
</html>
