<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <style>
        .section-card { background: white; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f8f9fa; }
    </style>
</head>
<body>
    <h2>Admin Dashboard</h2>
    <div id="customers-container"></div>
    <script>
        fetch('/admin-data').then(res => res.json()).then(data => {
            const container = document.getElementById('customers-container');
            container.innerHTML = "";
            data.customers.forEach(c => {
                const cPayments = data.payments.filter(p => p.customer_phone == c.phone);
                let html = `<div class="section-card"><h3>${c.name} (Ph: ${c.phone})</h3>
                <p><strong>Loan Taken Date:</strong> ${c.loan_taken_date || 'N/A'} | <strong>Total Loan:</strong> ₹${c.loan_amount}</p>
                <table><tr><th>Week</th><th>Amount</th><th>Date & Time</th><th>Status</th></tr>`;
                cPayments.forEach(p => {
                    html += `<tr><td>${p.week_number}</td><td>₹${p.amount}</td><td>${p.created_at || '-'}</td><td>${p.status}</td></tr>`;
                });
                html += `</table></div>`;
                container.innerHTML += html;
            });
        });
    </script>
</body>
</html>
