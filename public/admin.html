<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Jessica Micro Finance</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div style="display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 900px; margin: auto;">
        <h2>Admin Dashboard</h2>
        <button onclick="adminLogout()" style="background-color: #dc3545; padding: 10px 15px;">Logout 🔒</button>
    </div>
    
    <div style="display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; width: 100%; max-width: 900px; margin: 20px auto;">
        <form id="addCustomerForm" style="flex: 1; min-width: 300px;">
            <h3>Add New Customer</h3>
            <input type="text" id="newName" placeholder="Customer Name" required><br>
            <input type="text" id="newPhone" placeholder="Phone Number" required><br>
            <input type="password" id="newPassword" placeholder="Password" required><br>
            <button type="submit">Add Customer</button>
        </form>

        <form id="addPaymentForm" style="flex: 1; min-width: 300px;">
            <h3>Add Weekly Payment</h3>
            <input type="text" id="payPhone" placeholder="Customer Phone Number" required><br>
            <input type="text" id="payWeek" placeholder="Week (e.g., Week 3)" required><br>
            <input type="text" id="payAmount" placeholder="Amount (e.g., ₹1500)" required><br>
            <button type="submit">Add Payment</button>
        </form>
    </div>

    <h3 style="text-align: center;">Customer Details & Approvals</h3>
    <table border="1" cellpadding="10" cellspacing="0" style="margin: auto; width: 100%; max-width: 900px;">
        <thead>
            <tr>
                <th>Name</th>
                <th>Phone</th>
                <th>Week</th>
                <th>Amount</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="adminTable">
            <!-- డేటా ఇక్కడ వస్తుంది -->
        </tbody>
    </table>
    
    <script>
        if (localStorage.getItem("isAdmin") !== "true") {
            window.location.replace("/admin-login.html");
        }

        function adminLogout() {
            localStorage.removeItem("isAdmin");
            window.location.replace("/admin-login.html");
        }

        async function loadAdminData() {
            const response = await fetch('/get-all-customers');
            const result = await response.json();
            
            if (result.success) {
                let tableHtml = '';
                result.data.forEach(user => {
                    user.payments.forEach(payment => {
                        
                        let actionButtons = '';
                        
                        // స్టేటస్ Pending లేదా Requested ఉన్నప్పుడు Approve బటన్ వస్తుంది
                        if (payment.status === 'Pending' || payment.status === 'Requested ⏳') {
                            actionButtons += `<button onclick="approvePayment('${user.phone}', '${payment.week}')" style="background-color: #28a745; margin-right: 5px;">Approve</button>`;
                            
                            // కేవలం Pending లో ఉన్నవాళ్లకి మాత్రమే వాట్సాప్ రిమైండర్ వెళ్తుంది
                            if(payment.status === 'Pending') {
                                // వాట్సాప్ లో వెళ్ళాల్సిన ఆటోమేటిక్ మెసేజ్
                                const waMessage = `నమస్కారం ${user.name} గారు, మీ జెస్సికా మైక్రో ఫైనాన్స్ '${payment.week}' పేమెంట్ (${payment.amount}) పెండింగ్ ఉంది. దయచేసి మీ డ్యాష్‌బోర్డ్ ద్వారా త్వరగా చెల్లించగలరు.`;
                                const waLink = `https://wa.me/91${user.phone}?text=${encodeURIComponent(waMessage)}`;
                                
                                actionButtons += `
                                    <a href="${waLink}" target="_blank">
                                        <button style="background-color: #25D366; color: white; padding: 5px 10px; border: none; cursor: pointer; border-radius: 4px;">WhatsApp 💬</button>
                                    </a>
                                `;
                            }
                        } else {
                            actionButtons = '<span style="color: green; font-weight: bold;">Approved ✅</span>';
                        }

                        tableHtml += `
                            <tr>
                                <td>${user.name}</td>
                                <td>${user.phone}</td>
                                <td>${payment.week}</td>
                                <td>${payment.amount}</td>
                                <td style="color: ${payment.color}; font-weight: bold;">${payment.status}</td>
                                <td>${actionButtons}</td>
                            </tr>
                        `;
                    });
                });
                document.getElementById('adminTable').innerHTML = tableHtml;
            }
        }

        async function approvePayment(phone, week) {
            const response = await fetch('/approve-payment', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone, week })
            });
            const result = await response.json();
            if (result.success) {
                loadAdminData(); 
            }
        }

        document.getElementById('addCustomerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('newName').value;
            const phone = document.getElementById('newPhone').value;
            const password = document.getElementById('newPassword').value;
            const res = await fetch('/add-customer', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, phone, password }) });
            const data = await res.json();
            alert(data.message);
            if(data.success) { document.getElementById('addCustomerForm').reset(); loadAdminData(); }
        });

        document.getElementById('addPaymentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const phone = document.getElementById('payPhone').value;
            const week = document.getElementById('payWeek').value;
            const amount = document.getElementById('payAmount').value;
            const res = await fetch('/add-payment', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ phone, week, amount }) });
            const data = await res.json();
            alert(data.message);
            if(data.success) { document.getElementById('addPaymentForm').reset(); loadAdminData(); }
        });

        loadAdminData();
    </script>
</body>
</html>
