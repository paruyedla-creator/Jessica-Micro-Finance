<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Loan Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f4f7f9; font-family: 'Segoe UI', sans-serif; }
        .header-bg { background: linear-gradient(135deg, #0f172a, #1e293b); padding: 20px 20px 50px; color: white; border-radius: 0 0 25px 25px; }
        .main-card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); margin-top: -30px; position: relative; z-index: 10; }
        .info-box { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 12px; text-align: center; }
        
        .pay-btn { font-weight: bold; border-radius: 8px; padding: 12px; width: 100%; border: none; transition: 0.3s; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 15px;}
        .pay-btn:hover { transform: translateY(-2px); }
        .pay-btn:disabled { background-color: #94a3b8 !important; color: white !important; cursor: not-allowed; border: none !important;}
        
        .phonepe-btn { background-color: #5f259f; color: white; }
        .gpay-btn { background-color: #ffffff; color: #3c4043; border: 1px solid #dadce0; }
        .paytm-btn { background-color: #00b9f5; color: white; }
        
        .history-table th { font-size: 11px; text-transform: uppercase; color: #64748b; }
        .history-table td { font-size: 13px; font-weight: 500; }
        .referral-box { border: 2px dashed #3b82f6; background: #eff6ff; padding: 15px; border-radius: 10px; text-align: center; margin-top: 20px;}
    </style>
</head>
<body>

    <div class="header-bg d-flex justify-content-between align-items-center">
        <div>
            <div style="font-size: 12px; color: #cbd5e1;">Welcome,</div>
            <h5 class="fw-bold mb-0" id="cName">Loading...</h5>
        </div>
        <button class="btn btn-sm btn-outline-light" onclick="logoutCustomer()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>

    <div class="container pb-4 max-w-100">
        <div class="main-card">
            
            <div class="row g-2 mb-3">
                <div class="col-4"><div class="info-box"><div style="font-size: 10px; color: #64748b;">TOTAL WEEKS</div><div class="fw-bold" id="cTotalWeeks">0</div></div></div>
                <div class="col-4"><div class="info-box"><div style="font-size: 10px; color: #10b981;">PAID WEEKS</div><div class="fw-bold text-success" id="cPaidWeeks">0</div></div></div>
                <div class="col-4"><div class="info-box"><div style="font-size: 10px; color: #dc3545;">PENDING</div><div class="fw-bold text-danger" id="cPendingWeeks">0</div></div></div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4 p-3 bg-light rounded border">
                <div>
                    <div style="font-size: 11px; color: #64748b; font-weight: bold;">WEEKLY EMI</div>
                    <div class="fw-bold fs-4 text-primary" id="cEmi">₹0</div>
                </div>
                <div class="text-end">
                    <div style="font-size: 11px; color: #64748b; font-weight: bold;">PENALTY DUE</div>
                    <div class="fw-bold fs-5 text-danger" id="cPenalty">₹0</div>
                </div>
            </div>

            <!-- Direct UPI Payment Buttons -->
            <div id="paymentSection">
                <div style="font-size: 12px; font-weight: bold; color: #64748b; margin-bottom: 10px; text-align: center;">PAY SECURELY VIA UPI</div>
                
                <button class="pay-btn phonepe-btn payment-btn" onclick="payViaUPI('phonepe')">Pay with PhonePe</button>
                <button class="pay-btn gpay-btn payment-btn" onclick="payViaUPI('gpay')"><img src="https://upload.wikimedia.org/wikipedia/commons/f/f2/Google_Pay_Logo.svg" alt="GPay" style="height: 16px;"> Pay with GPay</button>
                <button class="pay-btn paytm-btn payment-btn" onclick="payViaUPI('paytm')">Pay with Paytm</button>
            </div>

            <div id="pendingStatus" class="text-center fw-bold mt-3" style="display: none; font-size: 13px; color: #d97706; background: #fef3c7; padding: 10px; border-radius: 8px; border: 1px solid #fcd34d;">
                <i class="fas fa-spinner fa-spin me-1"></i> Payment initiated! Waiting for Admin Approval...
            </div>
        </div>

        <div class="main-card mt-3">
            <h6 class="fw-bold mb-3" style="color: #0f172a;"><i class="fas fa-history text-primary"></i> Payment History</h6>
            <div class="table-responsive">
                <table class="table history-table">
                    <thead><tr><th>Week</th><th>Date</th><th>Amount</th><th>Status</th></tr></thead>
                    <tbody id="historyBody"></tbody>
                </table>
            </div>
        </div>

        <div class="referral-box">
            <div style="font-size: 12px; font-weight: bold; color: #1e3a8a; margin-bottom: 5px;">Share with friends & earn rewards!</div>
            <div style="font-size: 16px; font-weight: 900; color: #2563eb; letter-spacing: 2px;" id="cReferral">REF-XXXXX</div>
        </div>
    </div>

    <script>
        const formatMoney = (amount) => '₹' + Number(amount).toLocaleString('en-IN');
        let currentCustomer = null;
        let emiAmount = 0;
        
        const adminUPI_Number = "7569532152";
        const businessName = "Jessica Finance"; 

        async function fetchMyData() {
            try {
                // 1. లోకల్ డేటా చెక్
                const localDataString = localStorage.getItem('loggedInCustomer');
                if (!localDataString) return logoutCustomer();
                
                const localData = JSON.parse(localDataString);
                if (!localData.phone) return logoutCustomer();

                // 2. ఫ్రెష్ డేటా కోసం సర్వర్ కి రిక్వెస్ట్
                const response = await fetch('/api/login', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: localData.phone, password: localData.password })
                });
                const data = await response.json();
                
                // 3. కస్టమర్ డేటాబేస్ లో ఉంటేనే డాష్ బోర్డ్ ఓపెన్ అవుతుంది, లేకపోతే లాగౌట్!
                if(data.success && data.role === 'customer') {
                    currentCustomer = data.customerData;
                    localStorage.setItem('loggedInCustomer', JSON.stringify(currentCustomer)); 
                    updateUI();
                } else {
                    logoutCustomer();
                }
            } catch (error) {
                console.error("Error loading data:", error);
                logoutCustomer();
            }
        }

        function updateUI() {
            const cust = currentCustomer;
            
            let principal = Number(cust.amount) || 0;
            let duration = Number(cust.duration) || 1;
            let totalToPay = principal + (principal * 0.20); 
            emiAmount = Math.round(totalToPay / duration);
            
            let paidWeeks = cust.paidWeeks || 0;
            let pendingWeeks = duration - paidWeeks;

            document.getElementById('cName').innerText = cust.name || 'User';
            document.getElementById('cTotalWeeks').innerText = duration;
            document.getElementById('cPaidWeeks').innerText = paidWeeks;
            document.getElementById('cPendingWeeks').innerText = pendingWeeks;
            document.getElementById('cEmi').innerText = formatMoney(emiAmount);
            document.getElementById('cPenalty').innerText = formatMoney(cust.penalty || 0);
            document.getElementById('cReferral').innerText = cust.referralCode || 'REF-XXXXX';

            if(cust.pendingApproval) {
                document.getElementById('paymentSection').style.display = 'none';
                document.getElementById('pendingStatus').style.display = 'block';
            } else {
                document.getElementById('paymentSection').style.display = 'block';
                document.getElementById('pendingStatus').style.display = 'none';
            }

            const tbody = document.getElementById('historyBody');
            tbody.innerHTML = '';
            if(cust.history && cust.history.length > 0) {
                [...cust.history].reverse().forEach(record => {
                    tbody.innerHTML += `
                        <tr>
                            <td>Wk-${record.week}</td>
                            <td>${record.date}</td>
                            <td class="text-success fw-bold">${formatMoney(record.amount)}</td>
                            <td><span class="badge bg-success">Paid</span></td>
                        </tr>
                    `;
                });
            } else {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted">No payments made yet.</td></tr>';
            }
        }

        async function payViaUPI(appType) {
            const buttons = document.querySelectorAll('.payment-btn');
            buttons.forEach(btn => btn.disabled = true);
            
            await fetch('/api/action', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone: currentCustomer.phone, action: 'request_payment', amount: emiAmount })
            });

            let upiId = "";
            if (appType === 'phonepe') upiId = adminUPI_Number + "@ybl";
            else if (appType === 'gpay') upiId = adminUPI_Number + "@okicici"; 
            else if (appType === 'paytm') upiId = adminUPI_Number + "@paytm";
            else upiId = adminUPI_Number + "@ybl";

            let upiLink = `upi://pay?pa=${upiId}&pn=${encodeURIComponent(businessName)}&am=${emiAmount}&cu=INR&tn=EMI Payment`;
            window.location.href = upiLink;

            setTimeout(() => { fetchMyData(); }, 1000);
        }

        function logoutCustomer() {
            localStorage.removeItem('loggedInCustomer');
            window.location.href = 'index.html'; // పాత డేటా ఉంటే నేరుగా లాగిన్ పేజీకి పంపేస్తుంది
        }

        fetchMyData();
    </script>
</body>
</html>
