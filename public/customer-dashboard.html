<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Dashboard</title>
</head>
<body>
    <h2>My Dashboard</h2>
    <div class="stat-box"><h4>Penalty Due: <span id="penalty-due">₹0</span></h4></div>
    <table>
        <thead><tr><th>Week</th><th>Amount</th><th>Date & Time</th><th>Status</th></tr></thead>
        <tbody id="history-list"></tbody>
    </table>
    <script>
        const phone = new URLSearchParams(window.location.search).get('phone');
        fetch(`/customer-data/${phone}`).then(res => res.json()).then(data => {
            document.getElementById('penalty-due').innerText = '₹' + (data.customer.penalty || 0);
            const list = document.getElementById('history-list');
            data.payments.forEach(p => {
                list.innerHTML += `<tr><td>${p.week_number}</td><td>₹${p.amount}</td><td>${p.created_at || '-'}</td><td>${p.status}</td></tr>`;
            });
        });
    </script>
</body>
</html>
