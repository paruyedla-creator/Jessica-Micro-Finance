<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Dashboard - Jessica Micro Finance</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div style="display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 800px; margin: auto;">
        <h2>Welcome, <span id="userName"></span>!</h2>
        <button onclick="logout()" style="background-color: #dc3545; padding: 10px 15px;">Logout</button>
    </div>
    
    <h3>Your Weekly Payments</h3>
    <table border="1" cellpadding="10" cellspacing="0" style="margin: auto;">
        <thead>
            <tr>
                <th>Week</th>
                <th>Amount</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="paymentTable">
            <!-- డేటా ఇక్కడ వస్తుంది -->
        </tbody>
    </table>

    <script>
        const userPhone = localStorage.getItem("userPhone");
        
        if (!userPhone) {
            window.location.replace("/index.html");
        }

        function logout() {
            localStorage.removeItem("userPhone");
            window.location.replace("/index.html");
        }

        async function loadDashboard() {
            const response = await fetch('/get-dashboard-data', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone: userPhone })
            });
            const result = await response.json();
            
            if (result.success) {
                document.getElementById('userName').innerText = result.data.name;
                let tableHtml = '';
                
                // మీ ఫోన్‌పే/గూగుల్ పే UPI ID ఇక్కడ మార్చుకోండి 
                const myUpiId = "your-upi-id@ybl"; 
                
                result.data.payments.forEach(payment => {
                    const numAmount = payment.amount.replace(/[^0-9]/g, '');
                    const upiLink = `upi://pay?pa=${myUpiId}&pn=Jessica%20Micro%20Finance&am=${numAmount}&cu=INR`;

                    let actionButtons = '';
                    if (payment.status === 'Pending') {
                        actionButtons = `
                            <a href="${upiLink}" target="_blank">
                                <button style="background-color: #007bff; padding: 5px 10px; margin-right: 5px;">Pay via UPI</button>
                            </a>
                            <button onclick="requestApproval('${payment.week}')" style="background-color: #ff9800; padding: 5px 10px;">I Paid ✅</button>
                        `;
                    } else if (payment.status === 'Requested ⏳') {
                        actionButtons = '<span style="color: #ff9800;">Awaiting Approval ⏳</span>';
                    } else {
                        actionButtons = '<span style="color: green; font-weight: bold;">Approved ✅</span>';
                    }

                    tableHtml += `
                        <tr>
                            <td>${payment.week}</td>
                            <td>${payment.amount}</td>
                            <td style="color: ${payment.color}; font-weight: bold;">${payment.status}</td>
                            <td>${actionButtons}</td>
                        </tr>
                    `;
                });
                document.getElementById('paymentTable').innerHTML = tableHtml;
            }
        }

        async function requestApproval(week) {
            if(confirm("మీరు నిజంగా పేమెంట్ చేశారా? అడ్మిన్ కి రిక్వెస్ట్ పంపమంటారా?")) {
                const response = await fetch('/request-approval', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone: userPhone, week })
                });
                const result = await response.json();
                if(result.success) {
                    alert(result.message);
                    loadDashboard();
                }
            }
        }

        loadDashboard();
    </script>
</body>
</html>
