<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jessica Micro Finance - Login</title>
</head>
<body>
    <h2>Jessica Micro Finance</h2>
    <h3>Customer Login</h3>
    
    <form id="loginForm">
        <label>Phone Number:</label><br>
        <input type="text" id="phone" placeholder="Enter phone number" required><br><br>
        
        <label>Password:</label><br>
        <input type="password" id="password" placeholder="Enter password" required><br><br>
        
        <button type="submit">Login</button>
    </form>

    <h4 id="message"></h4>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault(); 
            
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const messageEl = document.getElementById('message');

            const response = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone, password })
            });

            const data = await response.json();
            
            if (data.success) {
                // ఫోన్ నంబర్‌ను సేవ్ చేసి డ్యాష్‌బోర్డ్‌కి పంపడం
                localStorage.setItem("userPhone", phone);
                window.location.href = "/dashboard.html";
            } else {
                messageEl.style.color = "red";
                messageEl.innerText = data.message;
            }
        });
    </script>
</body>
</html>
