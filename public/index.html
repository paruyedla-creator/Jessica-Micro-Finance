<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Jessica Micro Finance</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-card { background: white; padding: 40px 30px; border-radius: 10px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .logo { font-size: 24px; font-weight: bold; color: #0056b3; margin-bottom: 10px; }
        .subtitle { color: #666; font-size: 14px; margin-bottom: 30px; }
        .form-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 14px; font-weight: 600; color: #333; margin-bottom: 8px; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; transition: 0.3s; }
        input:focus { border-color: #0056b3; outline: none; box-shadow: 0 0 5px rgba(0, 86, 179, 0.2); }
        button { width: 100%; padding: 14px; background-color: #0056b3; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #004494; }
        .footer-text { margin-top: 20px; font-size: 12px; color: #888; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">🏦 Jessica Micro Finance</div>
        <div class="subtitle">Secure Finance Management System</div>

        <form action="/login" method="POST">
            <div class="form-group">
                <label>Phone Number (Login ID)</label>
                <input type="number" name="phone" placeholder="Enter 10-digit mobile number" required>
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>

            <button type="submit">Secure Login</button>
        </form>
        
        <div class="footer-text">
            &copy; 2026 Jessica Micro Finance. All rights reserved.
        </div>
    </div>

</body>
</html>
